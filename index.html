<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calls Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Calls Dashboard</h1>
      <p class="subtitle">Данные из Supabase / calls_view</p>
    </div>
  </header>

  <main class="container">
    <section class="panel filters">
      <div class="field">
        <label for="searchInput">Поиск по номеру / категории / очереди</label>
        <input id="searchInput" type="text" placeholder="Например: 380, sales, support" />
      </div>

      <div class="field">
        <label for="dateFrom">Дата от</label>
        <input id="dateFrom" type="date" />
      </div>

      <div class="field">
        <label for="dateTo">Дата до</label>
        <input id="dateTo" type="date" />
      </div>

      <div class="field">
        <label for="limitSelect">Показывать записей</label>
        <select id="limitSelect">
          <option value="20">20</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
      </div>

      <div class="actions">
        <button id="loadBtn">Загрузить</button>
        <button id="resetBtn" class="secondary">Сбросить</button>
      </div>
    </section>

    <section class="panel summary">
      <div class="summary-item">
        <span class="summary-label">Всего строк</span>
        <span class="summary-value" id="totalCount">0</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Средняя длительность</span>
        <span class="summary-value" id="avgDuration">0 сек</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Средняя оценка</span>
        <span class="summary-value" id="avgScore">—</span>
      </div>
    </section>

    <section class="panel">
      <div id="status" class="status">Готово к загрузке</div>
      <div class="table-wrap">
        <table id="callsTable">
          <thead>
  <tr>
    <th>Дата</th>
    <th>Від</th>
    <th>куди</th>
    <th>Трив.</th>
    <th>Оцінка оператора</th>
    <th>Категорія</th>
    <th>Підкатегорія</th>
    <th>Операція</th>
    <th>Кейс</th>
    <th>Очередь</th>
    <th>Діалог</th>
    <th>Результат</th>
  </tr>
</thead>
<tbody id="callsBody">
  <tr>
    <td colspan="12" class="empty">Нет данных</td>
  </tr>
</tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="./script.js"></script>
</body>
</html>
