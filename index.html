<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Панель дзвінків</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand-mark">
      <span class="brand-box brand-box-left">❮</span>
      <span class="brand-box brand-box-right">❯</span>
    </div>
    <div class="brand-copy">
      <div class="brand-name">rockpay</div>
      <div class="brand-subtitle">Call Quality Dashboard</div>
    </div>
  </div>
</header>

<main class="container">

<section class="hero-card">
  <div class="hero-copy">
    <div class="eyebrow">Workspace</div>
    <h1>Панель дзвінків</h1>
    <p>Транскрібація Creatio · контроль якості · аналітика операторів</p>
  </div>
</section>

<section class="panel filters">
  <!-- твои фильтры 그대로 -->
</section>

<!-- 🔥 НОВЫЙ БЛОК -->
<section class="panel column-panel">
  <div class="column-panel-title">Колонки таблиці</div>
  <div id="columnToggles" class="column-toggles"></div>

  <div class="column-actions">
    <button id="showAllColumnsBtn" class="secondary">Показати всі</button>
    <button id="hideTextColumnsBtn" class="secondary">Сховати тексти</button>
  </div>
</section>

<section class="summary-grid">
  <div class="summary-card">
    <div class="summary-label">Усього рядків</div>
    <div class="summary-value" id="totalCount">0</div>
  </div>

  <div class="summary-card accent">
    <div class="summary-label">Коректних</div>
    <div class="summary-value" id="correctPercent">0%</div>
  </div>
</section>

<section class="panel table-panel">

  <div id="status" class="status">Готово</div>

  <div id="tableWrap" class="table-wrap">
    <table id="callsTable">
      <thead>
        <tr>
          <th>Дата</th>
          <th>Оператор</th>
          <th>Звідки</th>
          <th>Куди</th>
          <th>Total score</th>
          <th>Max score</th>
          <th>Категорія</th>
          <th>Підкатегорія</th>
          <th>Код операції</th>
          <th>Кейс</th>
          <th>Черга</th>
          <th>Коректність</th>
          <th>Raw</th>
          <th>JSON</th>
        </tr>
      </thead>
      <tbody id="callsBody"></tbody>
    </table>
  </div>

</section>

</main>

<script src="./script.js"></script>
</body>
</html>
